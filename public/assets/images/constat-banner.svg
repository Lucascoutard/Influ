<svg width="100%" viewBox="0 0 960 380" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;font-family:'DM Sans','Inter','Helvetica Neue',Arial,sans-serif">

  <!-- Left: Market growth bar chart -->
  <text x="52" y="18" style="font-size:11px;font-weight:600;fill:#6B6A65;letter-spacing:0.08em">MARKET SIZE (USD BILLIONS)</text>

  <!-- Y axis labels -->
  <text x="44" y="85" style="font-size:11px;fill:#9c9a92" text-anchor="end">$35B</text>
  <text x="44" y="145" style="font-size:11px;fill:#9c9a92" text-anchor="end">$25B</text>
  <text x="44" y="205" style="font-size:11px;fill:#9c9a92" text-anchor="end">$15B</text>
  <text x="44" y="265" style="font-size:11px;fill:#9c9a92" text-anchor="end">$5B</text>

  <!-- Grid lines -->
  <line x1="52" y1="80" x2="340" y2="80" stroke="#e5e4df" stroke-width="0.5"/>
  <line x1="52" y1="140" x2="340" y2="140" stroke="#e5e4df" stroke-width="0.5"/>
  <line x1="52" y1="200" x2="340" y2="200" stroke="#e5e4df" stroke-width="0.5"/>
  <line x1="52" y1="260" x2="340" y2="260" stroke="#e5e4df" stroke-width="0.5"/>
  <line x1="52" y1="290" x2="340" y2="290" stroke="#d3d1c7" stroke-width="0.5"/>

  <!-- Bars -->
  <!-- 2016: $1.7B -->
  <rect x="68" y="280" width="36" height="10" rx="3" fill="#D8CCE8" opacity="0.6"/>
  <text x="86" y="306" text-anchor="middle" style="font-size:10px;fill:#9c9a92">2016</text>
  <text x="86" y="275" text-anchor="middle" style="font-size:10px;fill:#6B6A65">$1.7B</text>

  <!-- 2019: $6.5B -->
  <rect x="122" y="251" width="36" height="39" rx="3" fill="#C8B8E0" opacity="0.7"/>
  <text x="140" y="306" text-anchor="middle" style="font-size:10px;fill:#9c9a92">2019</text>
  <text x="140" y="246" text-anchor="middle" style="font-size:10px;fill:#6B6A65">$6.5B</text>

  <!-- 2022: $16.4B -->
  <rect x="176" y="192" width="36" height="98" rx="3" fill="#AFA9EC" opacity="0.75"/>
  <text x="194" y="306" text-anchor="middle" style="font-size:10px;fill:#9c9a92">2022</text>
  <text x="194" y="187" text-anchor="middle" style="font-size:10px;fill:#6B6A65">$16.4B</text>

  <!-- 2024: $24B -->
  <rect x="230" y="146" width="36" height="144" rx="3" fill="#7F77DD" opacity="0.8"/>
  <text x="248" y="306" text-anchor="middle" style="font-size:10px;fill:#9c9a92">2024</text>
  <text x="248" y="141" text-anchor="middle" style="font-size:10px;fill:#6B6A65">$24B</text>

  <!-- 2025: $33B -->
  <rect x="284" y="92" width="36" height="198" rx="3" fill="#534AB7"/>
  <text x="302" y="306" text-anchor="middle" style="font-size:10px;fill:#9c9a92">2025</text>
  <text x="302" y="87" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#534AB7">$33B</text>

  <!-- Trend line -->
  <path d="M86 280 L140 251 L194 192 L248 146 L302 92" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Divider -->
  <line x1="390" y1="30" x2="390" y2="340" stroke="#e5e4df" stroke-width="0.5"/>

  <!-- Right: Donut charts -->

  <!-- 87% donut -->
  <circle cx="530" cy="130" r="80" fill="none" stroke="#e5e4df" stroke-width="3"/>
  <circle cx="530" cy="130" r="80" fill="none" stroke="#E24B4A" stroke-width="4" stroke-linecap="round"
    stroke-dasharray="435 502.65" stroke-dashoffset="-125.66"
    transform="rotate(-90 530 130)"/>
  <text x="530" y="118" text-anchor="middle" style="font-size:32px;font-weight:600;fill:#1a1a1a">87%</text>
  <text x="530" y="140" text-anchor="middle" style="font-size:11px;fill:#6B6A65">of creators report</text>
  <text x="530" y="155" text-anchor="middle" style="font-size:11px;fill:#6B6A65">payment issues</text>

  <!-- 49% donut -->
  <circle cx="770" cy="130" r="80" fill="none" stroke="#e5e4df" stroke-width="3"/>
  <circle cx="770" cy="130" r="80" fill="none" stroke="#C9A96E" stroke-width="4" stroke-linecap="round"
    stroke-dasharray="246 502.65" stroke-dashoffset="-125.66"
    transform="rotate(-90 770 130)"/>
  <text x="770" y="118" text-anchor="middle" style="font-size:32px;font-weight:600;fill:#1a1a1a">49%</text>
  <text x="770" y="140" text-anchor="middle" style="font-size:11px;fill:#6B6A65">of brands lack full</text>
  <text x="770" y="155" text-anchor="middle" style="font-size:11px;fill:#6B6A65">payment visibility</text>

  <!-- Bottom labels under donuts -->
  <text x="530" y="240" text-anchor="middle" style="font-size:10px;font-weight:500;fill:#E24B4A;letter-spacing:0.05em">CREATOR PAIN</text>
  <text x="770" y="240" text-anchor="middle" style="font-size:10px;font-weight:500;fill:#C9A96E;letter-spacing:0.05em">BRAND BLIND SPOT</text>

  <!-- Connecting message -->
  <rect x="560" y="270" width="300" height="44" rx="8" fill="#F5F0E8" stroke="#e5e4df" stroke-width="0.5"/>
  <text x="710" y="290" text-anchor="middle" style="font-size:11px;font-weight:500;fill:#534AB7">Influmatch fixes both sides.</text>
  <text x="710" y="305" text-anchor="middle" style="font-size:10px;fill:#6B6A65">Secure payments &#xB7; Clear briefs &#xB7; Full tracking</text>

  <!-- Sources -->
  <line x1="30" y1="340" x2="930" y2="340" stroke="#e5e4df" stroke-width="0.5"/>
  <text x="30" y="362" style="font-size:9px;fill:#9c9a92">Sources: Statista 2025 &#xB7; Business Insider Creator Survey &#xB7; ANA Influencer Marketing Compensation Report 2025</text>

</svg>
